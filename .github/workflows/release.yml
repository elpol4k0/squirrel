name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Test (Go ${{ matrix.go }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        go: ["1.24", "1.25"]
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Build
        run: go build ./...
        env:
          CGO_ENABLED: ${{ matrix.os == 'windows-latest' && '0' || '1' }}

      - name: Unit tests
        if: runner.os != 'Windows'
        run: go test -race -timeout 120s ./internal/...

      - name: Unit tests (Windows)
        if: runner.os == 'Windows'
        run: go test -timeout 120s ./internal/...
        env:
          CGO_ENABLED: "0"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8

      - name: Lint
        run: golangci-lint run --timeout=5m

  integration:
    name: Integration tests (PostgreSQL ${{ matrix.pg }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        pg: ["14", "15", "16", "17"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Run integration tests
        run: go test -v -timeout 300s -tags integration ./test/integration/...
        env:
          PG_VERSION: ${{ matrix.pg }}

  integration-mysql:
    name: Integration tests (MySQL 8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Run MySQL integration tests
        run: go test -v -timeout 300s -tags integration ./test/integration/...
        env:
          MYSQL_VERSION: "8"

  release:
    name: goreleaser
    runs-on: ubuntu-latest
    needs: [test, lint, integration, integration-mysql]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
